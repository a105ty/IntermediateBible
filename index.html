<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Intermediate Bible</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --bg:#FBF9F4; --panel:#FFFFFF; --panel2:#F4F0E7; --line:#E2DBCC;
  --ink:#221E18; --ink2:#6E655A; --accent:#8A6D1F; --accentSoft:#F2EAD4;
  --hl-kuning:#FCE7A2; --hl-hijau:#BFE3C9; --hl-biru:#BCD8EC; --hl-merah:#F2C4C0; --hl-ungu:#DDCBEC;
  --font-size:18px; --line-height:1.85;
  --body-font:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
}
html[data-theme="dark"]{
  --bg:#12100E; --panel:#1B1815; --panel2:#232019; --line:#332E27;
  --ink:#EDE6DA; --ink2:#A79C8C; --accent:#C8A24A; --accentSoft:#3A3220;
  --hl-kuning:#6B5A1E; --hl-hijau:#2C5138; --hl-biru:#274A5E; --hl-merah:#63302C; --hl-ungu:#43305C;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Inter",-apple-system,"Segoe UI",system-ui,sans-serif}
button,select,input,textarea{font-family:inherit}
button:focus-visible,select:focus-visible,input:focus-visible,textarea:focus-visible,
[tabindex]:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

/* ---------- topbar ---------- */
.topbar{position:sticky;top:0;z-index:40;background:var(--panel);
  border-bottom:1px solid var(--line);padding:env(safe-area-inset-top) 0 0}
.tbrow{display:flex;align-items:center;gap:8px;padding:9px 14px;flex-wrap:wrap}
.brand{font-weight:800;letter-spacing:-.02em;font-size:15px;color:var(--accent);margin-right:4px}
.refbtn{display:flex;align-items:center;gap:8px;padding:7px 12px;background:var(--panel2);
  border:1px solid var(--line);border-radius:8px;cursor:pointer;color:var(--ink);font-size:13px;font-weight:600}
.icobtn{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;
  border:1px solid var(--line);background:var(--panel2);color:var(--ink2);cursor:pointer;flex-shrink:0;font-size:14px}
.icobtn.on{background:var(--accentSoft);color:var(--accent);border-color:var(--accent)}
.spacer{flex:1}
.savestate{font-size:11px;color:var(--ink2);white-space:nowrap}
.savestate.err{color:#C0554A}

/* version rail */
.vrail{display:flex;gap:6px;padding:0 14px 9px;overflow-x:auto}
.vrail::-webkit-scrollbar{display:none}
.pill{display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;
  border:1px solid var(--line);background:var(--panel2);color:var(--ink2);cursor:pointer;
  font-size:12px;white-space:nowrap;flex:none}
.pill.on{background:var(--accentSoft);color:var(--accent);border-color:var(--accent);font-weight:600}
.pill .x{opacity:.6;font-size:13px;line-height:1}

/* ---------- layout ---------- */
.wrap{max-width:820px;margin:0 auto;padding:24px 16px 90px}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:6px}
h1.title{margin:0;font-family:var(--body-font);font-size:32px;font-weight:400;letter-spacing:-.01em}
h1.title span{color:var(--ink2)}
.intro{margin:8px 0 22px;font-size:12.5px;line-height:1.6;color:var(--ink2)}

/* ---------- verse rows (sejajar antar versi) ---------- */
.vrow{display:grid;gap:0 14px;border-radius:8px;padding:2px 0;margin-bottom:2px;
  align-items:start;transition:background 140ms ease}
.vrow:hover{background:var(--panel2)}
.vrow.sel{background:var(--accentSoft);box-shadow:inset 0 0 0 1px var(--accent)}
/* stabilo = isi warna */
.vrow.stab{background:var(--stab)}
/* sorot = outline */
.vrow.mark{box-shadow:inset 0 0 0 2px var(--mark)}
.vrow.mark.sel{box-shadow:inset 0 0 0 2px var(--mark),inset 0 0 0 4px var(--accent)}
.vcell{padding:7px 9px;cursor:pointer;min-width:0}
.vcell p{margin:0;font-family:var(--body-font);font-size:var(--font-size);line-height:var(--line-height);
  overflow-wrap:break-word}
.vcell.zh p{font-family:"Songti SC","SimSun","Noto Serif SC",serif;line-height:calc(var(--line-height) + .15)}
.vnum{color:var(--accent);font-weight:700;font-size:.62em;margin-right:6px;
  font-family:"Inter",sans-serif;vertical-align:super;user-select:none}
.vmark{font-size:11px;margin-left:6px;color:var(--accent)}
.miss{color:var(--ink2);font-style:italic;font-size:13px;font-family:"Inter",sans-serif}

/* kolom judul versi — ikut lebar grid */
.vhead{display:grid;gap:0 14px;position:sticky;top:0;z-index:5;
  background:var(--bg);padding:6px 0 8px;border-bottom:1px solid var(--line);margin-bottom:8px}
.vhcell{padding:0 9px;font-size:10.5px;font-weight:700;letter-spacing:.09em;
  text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:6px;min-width:0}
.vhcell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.swapb{border:none;background:none;color:var(--ink2);cursor:pointer;font-size:12px;padding:2px;flex:none}
.swapb:hover{color:var(--accent)}

/* ---------- interlinear di bawah ayat ---------- */
.inter{display:flex;flex-wrap:wrap;gap:5px;margin:6px 9px 12px;padding-top:10px;
  border-top:1px dashed var(--line)}
.inter.rtl{flex-direction:row-reverse;justify-content:flex-end}
.iw{background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:6px 9px;
  cursor:pointer;text-align:center;min-width:64px;display:flex;flex-direction:column;gap:2px}
.iw:hover{border-color:var(--accent)}
.iw .o{font-size:18px;color:var(--ink);font-family:"Times New Roman","SBL Hebrew","SBL Greek",serif;line-height:1.5}
.iw .tr{font-size:9.5px;color:var(--ink2);font-style:italic}
.iw .gl{font-size:10.5px;color:var(--ink);line-height:1.35}
.iw .gl.zh{font-family:"Songti SC","SimSun","Noto Serif SC",serif;font-size:12px}
.iw .gl.dim{color:var(--ink2);font-size:9.5px}
.iw .st{font-size:8.5px;color:var(--accent);font-weight:700}
.ilnote{font-size:11px;color:var(--ink2);margin:0 9px 14px;line-height:1.5}

/* ---------- tools ---------- */
.tools{position:sticky;bottom:0;margin-top:20px;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:14px;box-shadow:0 -6px 24px rgba(0,0,0,.07);z-index:20}
html[data-theme="dark"] .tools{box-shadow:0 -6px 24px rgba(0,0,0,.4)}
.toolhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px}
.toolref{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.tlabel{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink2);margin:10px 0 6px}
.swrow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;cursor:pointer;border:1px solid var(--line)}
.swatch.on{border:2px solid var(--accent);transform:scale(1.1)}
.swatch.ring{background:transparent!important}
.swatch.none{background:transparent;border-style:dashed;display:flex;align-items:center;
  justify-content:center;color:var(--ink2);font-size:13px}
textarea.note{width:100%;padding:10px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel2);color:var(--ink);font-size:13px;resize:vertical;outline:none;min-height:74px}
.trow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{padding:9px 15px;border-radius:8px;border:1px solid var(--accent);background:var(--accent);
  color:var(--bg);font-size:12.5px;font-weight:700;cursor:pointer}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line);font-weight:600}
.btn.warn{background:transparent;color:#C0554A;border-color:#C0554A}

/* ---------- overlay ---------- */
.ov{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.42);display:none;
  align-items:flex-start;justify-content:center;padding:5vh 14px 14px;overflow-y:auto}
.ov.on{display:flex}
.ovbox{background:var(--panel);border-radius:14px;border:1px solid var(--line);width:100%;
  max-width:580px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.ovhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px}
.ovtitle{margin:0;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
.srch{width:100%;padding:11px 13px;border-radius:9px;border:1px solid var(--line);
  background:var(--panel2);color:var(--ink);font-size:14.5px;outline:none;margin-bottom:12px}
.res{display:flex;gap:10px;align-items:center;width:100%;text-align:left;cursor:pointer;background:var(--panel2);
  border:1px solid var(--line);border-radius:9px;padding:11px;margin-bottom:7px;color:var(--ink)}
.res.on{border-color:var(--accent);background:var(--accentSoft)}
.res .t{flex:1;min-width:0}
.res .t b{display:block;font-size:13px;font-weight:600}
.res .t i{display:block;font-size:11px;color:var(--ink2);font-style:normal;margin-top:2px}
.tag{font-size:9.5px;border:1px solid var(--line);border-radius:4px;padding:2px 5px;color:var(--ink2);flex:none}
.tag.full{color:var(--accent);border-color:var(--accent)}
.tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.chapbtn{min-width:38px;padding:8px 6px;justify-content:center;font-weight:600;color:var(--ink);
  border:1px solid var(--line);background:var(--panel2);border-radius:7px;cursor:pointer;font-size:12.5px}
.chapbtn.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.grid-b{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:6px}
.grid-c{display:grid;grid-template-columns:repeat(auto-fill,minmax(44px,1fr));gap:6px}
.fld{display:block;font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink2);margin:12px 0 5px}
.inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel2);color:var(--ink);font-size:13.5px;outline:none}
.hint{font-size:11.5px;color:var(--ink2);line-height:1.6;margin:8px 0 0}
.sechead{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink2);margin:16px 0 8px}
.sechead:first-child{margin-top:0}
.vrow.pinned{position:relative}
.pinbadge{position:absolute;top:2px;right:4px;font-size:12px;line-height:1;z-index:2;
  pointer-events:none;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
.vcell{position:relative;-webkit-user-select:none;user-select:none}
.chk{width:22px;height:22px;border-radius:6px;flex:none;cursor:pointer;border:1.5px solid var(--line);
  background:transparent;display:flex;align-items:center;justify-content:center;
  color:transparent;font-size:13px;font-weight:900}
.chk.on{border-color:var(--accent);background:var(--accent);color:var(--bg)}
.diag{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-top:1px solid var(--line);font-size:12px;line-height:1.5}
.diag b{flex:none;width:18px}
.diag .d{flex:1;color:var(--ink2)}
.diag.ok b{color:#3E8E5A}.diag.bad b{color:#C0554A}.diag.wait b{color:var(--ink2)}
.skel{height:1.05em;background:var(--line);border-radius:4px;opacity:.4;margin:10px 9px;animation:p 1.3s ease-in-out infinite}
.skel:nth-child(2n){width:86%}.skel:nth-child(3n){width:72%}
@keyframes p{50%{opacity:.15}}
.foot{position:fixed;left:0;right:0;bottom:0;z-index:25;background:var(--panel);
  border-top:1px solid var(--line);display:flex;gap:8px;
  padding:8px 14px calc(8px + env(safe-area-inset-bottom))}
.foot button{flex:1;padding:10px 0;border-radius:8px;border:1px solid var(--line);
  background:var(--panel2);color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer}
.foot button:disabled{opacity:.35}
.toast{position:fixed;left:50%;bottom:74px;transform:translateX(-50%);z-index:80;
  background:var(--ink);color:var(--bg);padding:10px 16px;border-radius:9px;
  font-size:12.5px;max-width:82vw;text-align:center}
</style>
</head>
<body>

<div class="topbar">
  <div class="tbrow">
    <span class="brand">Intermediate Bible</span>
    <button class="refbtn" id="refBtn">📖 <span id="refT">Kejadian 1</span></button>
    <button class="icobtn" id="ilBtn" title="Bahasa asli di bawah ayat">א</button>
    <span class="spacer"></span>
    <span class="savestate" id="sync"></span>
    <button class="icobtn" id="planBtn" title="Renungan harian">📅</button>
    <button class="icobtn" id="sylBtn" title="Silabus Alkitab">🎓</button>
    <button class="icobtn" id="findBtn" title="Cari ayat">🔍</button>
    <button class="icobtn" id="dlBtn" title="Unduhan offline">⬇</button>
    <button class="icobtn" id="listBtn" title="Catatan tersimpan">📑</button>
    <button class="icobtn" id="accBtn" title="Akun &amp; sinkronisasi">👤</button>
    <button class="icobtn" id="setBtn" title="Pengaturan">⚙</button>
  </div>
  <div class="vrail" id="vrail"></div>
</div>

<div class="wrap">
  <div class="eyebrow" id="eyeb">Perjanjian Lama</div>
  <h1 class="title" id="title">Kejadian <span>1</span></h1>
  <p class="intro" id="intro"></p>
  <div id="reader"></div>
  <div class="tools" id="tools" style="display:none"></div>
</div>

<div class="foot">
  <button id="prev">‹ Sebelumnya</button>
  <button id="next">Berikutnya ›</button>
</div>

<div class="ov" id="ov"><div class="ovbox" id="ovbox"></div></div>

function fullDef(e){
  if(!e) return "";
  return (e.strongs_def || e.kjv_def || "").replace(/\s+/g," ").trim();
}
function enGloss(e){
  if(!e) return "";
  let d = (e.strongs_def || "").replace(/\([^)]*\)/g," ").replace(/\s+/g," ").trim();
  if(!d) d = (e.kjv_def || "").replace(/\s+/g," ").trim();
  d = d.replace(/^[-\u2013\s"]+/,"");
  const cut = d.split(/[;]/)[0].trim();
  return cut.length > 30 ? cut.slice(0,28) + "\u2026" : cut;
}
function gloss(dict, sn){
  if(!sn) return {en:"", id:"", zh:"", tr:""};
  const e = dict ? dict[sn] : null;
  const pair = GLOSS_MAP[sn] || ["",""];
  return {
    en: enGloss(e),
    id: pair[0] || "",
    zh: pair[1] || "",
    tr: e ? (e.translit || e.xlit || "") : ""
  };
}
/* Susun baris arti sesuai pilihan pengguna.
   Mode "mix" menampilkan Indonesia + 中文 + Inggris bertumpuk. */
function glossLines(g){
  const out = [];
  const push = (v,cls) => { if(v) out.push([v,cls]); };
  switch(S.gloss){
    case "id":  push(g.id || g.tr || g.en, "gl"); break;
    case "zh":  push(g.zh || g.tr || g.en, "gl zh"); break;
    case "en":  push(g.en || g.tr, "gl"); break;
    case "mix":
      push(g.id, "gl");
      push(g.zh, "gl zh");
      push(g.en || (!g.id && !g.zh ? g.tr : ""), "gl dim");
      if(!out.length) push(g.tr, "gl dim");
      break;
    default:    push(g.id || g.tr || g.en, "gl");
  }
  return out;
}

      S.plan  = {...S.plan,  ...(data.data.plan  || {})};
      LS.set("state", LS.get("state") || "{}");
      persist(); render();
    }else await push();
    S.syncState = "synced";
  }catch(e){ S.syncState = "error"; console.error("pull:", e.message); }
  syncLabel();
}

   PASAL
   ========================================================= */
const chCache = new Map(), inflight = new Map();
function flat(c){
  let o = "";
  for(const it of c||[]){
    if(typeof it === "string") o += it;
    else if(it && typeof it.text === "string") o += it.text;
    else if(it && it.lineBreak) o += " ";
  }
  return o.replace(/\s+/g," ").trim();
}
async function getCh(vid, bookId, ch){
  const k = `${vid}|${bookId}|${ch}`;
  if(chCache.has(k)) return chCache.get(k);
  if(inflight.has(k)) return inflight.get(k);
  const b = bk(bookId);
  const p = (async () => {
    // 1) teks offline lebih dulu — supaya tetap terbaca tanpa jaringan
    try{
      const off = await offlineLoad(vid);
      if(off){
        const m = new Map();
        for(let n=1;n<=200;n++){
          const t = off.get(`${bookId}.${ch}.${n}`);
          if(t) m.set(n, t);
        }
        if(m.size){ const res = {ok:true, m, offline:true}; chCache.set(k,res); return res; }
      }
    }catch{}
    try{
      const r = await fetch(`${AO}/${encodeURIComponent(vid)}/${b.usfm}/${ch}.json`);
      if(r.status === 404) throw new Error("__404__");
      if(!r.ok) throw new Error("HTTP " + r.status);
      const j = await r.json();
      const m = new Map();
      for(const it of j?.chapter?.content || []){
        if(it?.type === "verse" && it.number != null){
          const t = flat(it.content);
          if(t) m.set(Number(it.number), t);
        }
      }
      if(!m.size) throw new Error("__404__");
      const res = {ok:true, m};
      chCache.set(k,res); return res;
    }catch(e){
      const res = {ok:false, missing:e.message === "__404__", msg:e.message};
      if(res.missing) chCache.set(k,res);
      return res;
    }finally{ inflight.delete(k); }
  })();
  inflight.set(k,p); return p;
}

/* verifikasi ID versi bawaan yang belum sempat diuji saat build.
   Hanya 404 yang dianggap "ID tidak ada" — kegagalan jaringan biasa

/* =========================================================
   KAMUS STRONG'S
   ========================================================= */
let SG=null, SH=null, GLEM=null;
const pd = t => JSON.parse(t.slice(t.indexOf("{"), t.lastIndexOf("}")+1));
async function dict(w){
  if(w === "G" && SG) return SG;
  if(w === "H" && SH) return SH;
  const r = await fetch(w === "G" ? SGRK : SHEB);
  if(!r.ok) throw new Error("kamus HTTP " + r.status);
  const d = pd(await r.text());
  if(w === "G") SG = d; else SH = d;
  return d;
}
function bare(t){
  return t.normalize("NFD").replace(/[\u0300-\u036f\u0483-\u0489]/g,"")
          .toLowerCase().replace(/ς/g,"σ").replace(/[^\p{L}]/gu,"");
}
function gidx(d){
  if(GLEM) return GLEM;
  GLEM = new Map();
  for(const k in d){ const l = d[k].lemma; if(l){ const b = bare(l); if(!GLEM.has(b)) GLEM.set(b,k); } }
  return GLEM;
}

/* =========================================================
   BAHASA ASLI
   ========================================================= */
const ilCache = new Map(), hebF = new Map(), grkF = new Map();
async function getIL(bookId, ch){
  const k = bookId + "|" + ch;
  if(ilCache.has(k)) return ilCache.get(k);
  const b = bk(bookId);
  const r = b.t === "PL" ? await heb(b,ch) : await grk(b,ch);
  ilCache.set(k,r); return r;
}
async function heb(b, ch){
  try{
    const d = await dict("H");
    if(!hebF.has(b.src)){
      const r = await fetch(`${HEB}/${b.src}.xml`);
      if(!r.ok) throw new Error("HTTP " + r.status);
      hebF.set(b.src, await r.text());
    }
    const xml = hebF.get(b.src), m = new Map();
    const re = new RegExp(`<verse osisID="${b.src}\\.${ch}\\.(\\d+)"([\\s\\S]*?)</verse>`,"g");
    let v;
    while((v = re.exec(xml))){
      const ws = [], wre = /<w\b([^>]*)>([\s\S]*?)<\/w>/g;
      let w;
      while((w = wre.exec(v[2]))){
        const lem = (w[1].match(/lemma="([^"]*)"/) || [,""])[1];
        const nums = lem.match(/\d+/g);
        const sn = nums ? "H" + nums[nums.length-1] : null;
        ws.push({o:w[2].replace(/<[^>]*>/g,"").replace(/\//g,""), s:sn, g:gloss(d,sn)});
      }
      if(ws.length) m.set(+v[1], ws);
    }
    if(!m.size) return {ok:false, msg:"Pasal ini tidak ada dalam naskah Ibrani."};
    return {ok:true, rtl:true, m};
  }catch(e){ return {ok:false, msg:"Naskah Ibrani gagal dimuat (" + e.message + ")."}; }
}
async function grk(b, ch){
  try{
    const d = await dict("G"), idx = gidx(d);
    if(!grkF.has(b.src)){
      const r = await fetch(`${GRK}/${b.src}-morphgnt.txt`);
      if(!r.ok) throw new Error("HTTP " + r.status);
      grkF.set(b.src, await r.text());
    }
    const want = String(ch).padStart(2,"0"), m = new Map();
    for(const line of grkF.get(b.src).split("\n")){
      if(!line) continue;
      const p = line.split(" ");
      if(p.length < 7 || p[0].slice(2,4) !== want) continue;
      const v = +p[0].slice(4,6);
      const sn = idx.get(bare(p[6])) || null;
      if(!m.has(v)) m.set(v,[]);
      m.get(v).push({o:p[3], s:sn, g:gloss(d,sn)});
    }
    if(!m.size) return {ok:false, msg:"Pasal ini tidak ada dalam naskah Yunani."};
    return {ok:true, rtl:false, m};
  }catch(e){ return {ok:false, msg:"Naskah Yunani gagal dimuat (" + e.message + ")."}; }
}

/* =========================================================
   UNDUHAN OFFLINE
   Satu terjemahan penuh bisa 3–10 MB, jauh melewati batas
   localStorage (~5 MB), jadi teks offline disimpan di IndexedDB.

   Dua jalur pengambilan:
   1. /api/{id}/complete.json — satu berkas untuk seluruh Alkitab.
      Tercantum di available_translations.json sebagai
      completeTranslationApiLink, tapi TIDAK ada di panduan resmi,
      jadi tidak dijamin selalu tersedia.
   2. Bila jalur 1 gagal, jatuh ke endpoint resmi
      /api/{id}/{BOOK}/{ch}.json per pasal, dengan jeda kecil
      supaya server tidak dibanjiri.
   Jalur 2 lebih lambat tapi memakai endpoint terdokumentasi,
   sehingga fitur ini tetap hidup walau jalur 1 dihapus.
   ========================================================= */
const DB_NAME = "webbase-offline", DB_VER = 1, STORE = "tr";
let _db = null;
function db(){
  if(_db) return Promise.resolve(_db);
  return new Promise((res,rej) => {
    if(!("indexedDB" in window)) return rej(new Error("IndexedDB tidak tersedia di peramban ini"));
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = () => {
      const d = r.result;
      if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, {keyPath:"id"});
    };
    r.onsuccess = () => { _db = r.result; res(_db); };
    r.onerror = () => rej(r.error || new Error("IndexedDB gagal dibuka"));
  });
}
function idb(mode, fn){
  return db().then(d => new Promise((res,rej) => {
    const tx = d.transaction(STORE, mode);
    let req;
    try{ req = fn(tx.objectStore(STORE)); }catch(e){ return rej(e); }
    tx.oncomplete = () => res(req ? req.result : undefined);
    tx.onerror = () => rej(tx.error);
    tx.onabort = () => rej(tx.error || new Error("Transaksi dibatalkan"));
  }));
}

const OFF = new Map();               // id -> Map("bookId.ch.n" -> teks)
async function offlineList(){
  try{ return (await idb("readonly", st => st.getAll())) || []; }catch{ return []; }
}
async function offlineLoad(id){
  if(OFF.has(id)) return OFF.get(id);
  try{
    const rec = await idb("readonly", st => st.get(id));
    if(!rec || !rec.data) return null;
    const m = new Map(Object.entries(rec.data));
    OFF.set(id, m);
    return m;
  }catch{ return null; }
}

const USFM2ID = {};
BOOKS.forEach(b => USFM2ID[b.usfm] = b.id);

function versesFromChapter(j, bid, ch, out){
  let n = 0;
  for(const it of j?.chapter?.content || []){
    if(it?.type === "verse" && it.number != null){
      const t = flat(it.content);
      if(t){ out[`${bid}.${ch}.${Number(it.number)}`] = t; n++; }
    }
  }
  return n;
}

async function tryComplete(id, out, onProgress){
  const r = await fetch(`${AO}/${id}/complete.json`);
  if(!r.ok) throw new Error("HTTP " + r.status);
  const total = +(r.headers.get("content-length") || 0);
  let text;
  if(total && r.body && r.body.getReader){
    const rd = r.body.getReader(); const parts = []; let got = 0;
    for(;;){
      const {done,value} = await rd.read();
      if(done) break;
      parts.push(value); got += value.length;
      onProgress({pct:Math.round(got/total*90), msg:`Mengunduh ${(got/1048576).toFixed(1)} MB`});
    }
    text = new TextDecoder().decode(await new Blob(parts).arrayBuffer());
  }else{
    onProgress({msg:"Mengunduh…"});
    text = await r.text();
  }
  onProgress({pct:92, msg:"Memproses…"});
  const j = JSON.parse(text);
  let n = 0;
  for(const b of j?.books || []){
    const bid = USFM2ID[b.id || b.book || b.bookId];
    if(!bid) continue;
    for(const c of b.chapters || []){
      const num = c.number ?? c.chapter;
      n += versesFromChapter(c.chapter ? c : {chapter:c}, bid, num, out);
    }
  }
  if(!n) throw new Error("complete.json kosong / format berbeda");
  return n;
}

async function perChapter(id, out, onProgress, ctl){
  const totalCh = BOOKS.reduce((s,b) => s + b.ch, 0);
  let done = 0, n = 0;
  for(const b of BOOKS){
    let bookMissing = false;
    for(let c=1;c<=b.ch;c++){
      if(ctl && ctl.stop) throw new Error("__ABORT__");
      try{
        const r = await fetch(`${AO}/${id}/${b.usfm}/${c}.json`);
        if(r.ok) n += versesFromChapter(await r.json(), b.id, c, out);
        else if(r.status === 404){ bookMissing = true; }
      }catch{}
      done++;
      if(done % 5 === 0) onProgress({pct:Math.round(done/totalCh*100), msg:`${b.name} ${c} · ${n.toLocaleString("id-ID")} ayat`});
      await new Promise(r => setTimeout(r, 12));
      if(bookMissing) break;              // kitab tak ada di versi ini
    }
    if(bookMissing) done += 0;
  }
  if(!n) throw new Error("Tidak ada pasal yang berhasil diunduh");
  return n;
}

async function downloadVersion(id, onProgress, ctl){
  const v = VER[id] || {};
  const out = {};
  let n = 0, via = "berkas utuh";
  onProgress({pct:0, msg:"Menyiapkan…"});
  try{
    n = await tryComplete(id, out, onProgress);
  }catch(e){
    if(e.message === "__ABORT__") throw e;
    via = "per pasal";
    onProgress({pct:0, msg:"Berkas utuh tidak tersedia — mengunduh per pasal…"});
    n = await perChapter(id, out, onProgress, ctl);
  }
  onProgress({pct:98, msg:"Menyimpan…"});
  const bytes = JSON.stringify(out).length;
  await idb("readwrite", st => st.put({
    id, data:out,
    meta:{name:v.name || id, abbr:v.abbr || id, verses:n, bytes, at:Date.now(), via}
  }));
  OFF.delete(id);
  onProgress({pct:100, msg:"Selesai"});
  return {n, bytes, via};
}
async function deleteVersion(id){
  await idb("readwrite", st => st.delete(id));
  OFF.delete(id);
}

/* =========================================================
   STATUS SUPABASE — satu baris, bukan langkah demi langkah.
   Tabel sudah dibuat dan RLS sudah benar, jadi ini hanya
   memastikan sinkronisasi benar-benar bisa menulis saat ini,
   tanpa membuka log berlangkah-langkah yang tidak perlu lagi.
   ========================================================= */
async function runDiag(host){
  host.innerHTML = "";
  const line = (state, txt) => {
    const d = el("div","diag " + state);
    d.appendChild(el("b", null, state === "ok" ? "✓" : state === "bad" ? "✕" : "…"));
    d.appendChild(el("div","d", txt));
    host.appendChild(d);
    return d;
  };
  if(!sb){ line("bad","Pustaka Supabase gagal dimuat. Muat ulang halaman."); return; }
  if(!S.user){ line("wait","Belum masuk."); return; }

  const l = line("wait","Menguji sinkronisasi…");
  try{
    const {error} = await sb.from("webbase_sync").upsert({
      user_id:S.user.id,
      data:{stab:S.stab, mark:S.mark, notes:S.notes, pin:S.pin, plan:S.plan},
      updated_at:new Date().toISOString()
    });
    if(error) throw error;
    l.className = "diag ok"; l.firstChild.textContent = "✓";

}

/* =========================================================
   UNDUHAN BAHASA ASLI
   Ibrani (39 berkas XML) + Yunani (27 berkas teks) + 2 kamus Strong's.
   Disimpan di IndexedDB dengan awalan "src:" supaya tidak bentrok
   dengan unduhan terjemahan.
   ========================================================= */
const SRC_KEY = "src:orig";

async function downloadOriginals(onProgress, ctl){
  const ot = BOOKS.filter(b => b.t === "PL");
  const nt = BOOKS.filter(b => b.t === "PB");
  const total = ot.length + nt.length + 2;
  let done = 0, bytes = 0;
  const store = {heb:{}, grk:{}, dict:{}};
  const tick = label => {
    done++;
    onProgress({pct:Math.round(done/total*100), msg:`${label} · ${(bytes/1048576).toFixed(1)} MB`});
  };

  for(const b of ot){
    if(ctl && ctl.stop) throw new Error("__ABORT__");
    const r = await fetch(`${HEB}/${b.src}.xml`);
    if(r.ok){ const t = await r.text(); store.heb[b.src] = t; bytes += t.length; }
    tick(b.name);
  }
  for(const b of nt){
    if(ctl && ctl.stop) throw new Error("__ABORT__");
    const r = await fetch(`${GRK}/${b.src}-morphgnt.txt`);
    if(r.ok){ const t = await r.text(); store.grk[b.src] = t; bytes += t.length; }
    tick(b.name);
  }
  for(const [k,url] of [["G",SGRK],["H",SHEB]]){
    if(ctl && ctl.stop) throw new Error("__ABORT__");
    const r = await fetch(url);
    if(r.ok){ const t = await r.text(); store.dict[k] = t; bytes += t.length; }
    tick("Kamus Strong's " + k);
  }
  if(!Object.keys(store.heb).length && !Object.keys(store.grk).length)
    throw new Error("Tidak ada berkas yang berhasil diunduh");

  onProgress({pct:99, msg:"Menyimpan…"});
  await idb("readwrite", st => st.put({
    id:SRC_KEY, data:store,
    meta:{name:"Bahasa asli (Ibrani + Yunani + Strong's)", abbr:"ASLI",
          bytes, at:Date.now(),
          books:Object.keys(store.heb).length + Object.keys(store.grk).length}
  }));
  onProgress({pct:100, msg:"Selesai"});
  return {bytes};
}

/* Muat berkas bahasa asli dari simpanan ke cache memori, supaya
   heb()/grk()/dict() memakainya tanpa jaringan. */
let origLoaded = false;
async function primeOriginals(){
  if(origLoaded) return false;
  let rec = null;
  try{ rec = await idb("readonly", st => st.get(SRC_KEY)); }catch{}
  if(!rec || !rec.data) return false;
  for(const [k,v] of Object.entries(rec.data.heb || {})) hebF.set(k,v);
  for(const [k,v] of Object.entries(rec.data.grk || {})) grkF.set(k,v);
  if(rec.data.dict?.G && !SG) SG = pd(rec.data.dict.G);
  if(rec.data.dict?.H && !SH) SH = pd(rec.data.dict.H);
  origLoaded = true;
  return true;
}
async function deleteOriginals(){
  await idb("readwrite", st => st.delete(SRC_KEY));
  hebF.clear(); grkF.clear(); ilCache.clear();
  origLoaded = false;
}

function wordCard(w){
  const d = w.s && w.s[0] === "G" ? SG : SH;
  const e = d ? d[w.s] : null;
  const tr = e ? (e.translit || e.xlit || "") : "";
  ov(w.o, box => {
    box.appendChild(el("div","sechead","Nomor Strong's"));

    if(e){
      if(e.lemma){ box.appendChild(el("div","sechead","Bentuk dasar")); box.appendChild(el("p","hint", e.lemma + (tr ? " · " + tr : ""))); }
      if(e.strongs_def){ box.appendChild(el("div","sechead","Definisi Strong's")); box.appendChild(el("p","hint", e.strongs_def.replace(/\s+/g," ").trim())); }
      if(e.kjv_def){ box.appendChild(el("div","sechead","Diterjemahkan sebagai (KJV)")); box.appendChild(el("p","hint", e.kjv_def.replace(/\s+/g," ").trim())); }
      if(e.derivation){ box.appendChild(el("div","sechead","Asal kata")); box.appendChild(el("p","hint", e.derivation.replace(/\s+/g," ").trim())); }
    }else{
      box.appendChild(el("p","hint","Kata ini tidak terpetakan ke entri Strong's."));

  });

/* ---------- ketuk lama = bookmark ----------
   Ketuk biasa memilih ayat; tahan ~500 ms memasang/melepas pin.
   Ditangani lewat pointer events supaya jalan di sentuh maupun tetikus,
   dan gerakan jari > 10 px dianggap menggulir, bukan menekan. */
function attachPress(node, n, k){
  let timer = null, fired = false, sx = 0, sy = 0;
  const clear = () => { clearTimeout(timer); timer = null; };
  node.addEventListener("pointerdown", e => {
    fired = false; sx = e.clientX; sy = e.clientY;
    timer = setTimeout(() => {
      fired = true;
      if(S.pin[k]) delete S.pin[k]; else S.pin[k] = Date.now();
      persist();
      if(navigator.vibrate) try{ navigator.vibrate(18); }catch{}
      toast(S.pin[k] ? "Bookmark dipasang" : "Bookmark dilepas");
      render();
    }, 500);
  });
  node.addEventListener("pointermove", e => {
    if(timer && (Math.abs(e.clientX-sx) > 10 || Math.abs(e.clientY-sy) > 10)) clear();
  });
  node.addEventListener("pointerup", () => {
    clear();
    if(!fired){ S.sel = (S.sel === n ? null : n); render(); }
  });
  node.addEventListener("pointercancel", clear);
  node.addEventListener("contextmenu", e => { if(fired) e.preventDefault(); });
}

/* ---------- pilih / cari versi ---------- */
let swapTarget = null;
function swapCol(i){ swapTarget = i; versionPicker(); }

function versionPicker(){
  ov(swapTarget != null ? "Ganti versi kolom " + (swapTarget+1) : "Versi terjemahan", box => {
    const q = el("input","srch");
    q.type = "search";
    q.placeholder = "Ketik bahasa — mis. Indonesian, Chinese, French, Javanese";
    box.appendChild(q);

    const hint = el("p","hint","");
    box.appendChild(hint);

    const listed = el("div"); listed.style.marginTop = "10px";
    box.appendChild(listed);

    function pick(id, meta){
      if(meta) VER[id] = meta;
      if(swapTarget != null){ S.cols[swapTarget] = id; swapTarget = null; }
      else if(!S.cols.includes(id)) S.cols.push(id);
      persist(); chips(); render(); closeOv();
      toast((VER[id].abbr || id) + " dipakai");
    }

    function drawInstalled(){
      listed.innerHTML = "";
      listed.appendChild(el("div","sechead","Terpasang"));
      Object.keys(VER).forEach(id => {
        const v = VER[id];
        const b = el("button","res" + (S.cols.includes(id) ? " on" : ""));
        const t = el("div","t");
        t.appendChild(el("b", null, v.name + (v.broken ? " — ID tidak berlaku" : "")));
        t.appendChild(el("i", null, `${v.lang} · ${id}`));
        b.appendChild(t);
        b.appendChild(el("span","tag" + (v.books === 66 ? " full" : ""), (v.books || "?") + " kitab"));
        b.onclick = () => {
          if(v.broken){ toast("ID ini tidak ada di server"); return; }
          if(swapTarget == null && S.cols.includes(id)){
            if(S.cols.length === 1){ toast("Sisakan minimal satu versi"); return; }
            S.cols = S.cols.filter(c => c !== id);
            persist(); chips(); render(); drawInstalled();
            return;
          }
          pick(id);
        };
        listed.appendChild(b);
      });
      hint.textContent = S.catState === "ok"
        ? `Katalog siap: ${S.catalog.length} versi. Ketik nama bahasa untuk menelusuri.`
        : S.catState === "loading" ? "Memuat katalog…"
        : S.catState === "err" ? "Katalog gagal dimuat — versi terpasang tetap bisa dipakai."
        : "";
    }

    function drawSearch(){
      const s = q.value.trim().toLowerCase();
      if(!s){ drawInstalled(); return; }
      if(!S.catalog){ hint.textContent = "Katalog belum siap."; return; }
      listed.innerHTML = "";

      // kelompokkan per bahasa supaya "isi nama bahasa -> muncul versinya"
      const hits = S.catalog.filter(t =>
        (t.lang||"").toLowerCase().includes(s) ||
        (t.native||"").toLowerCase().includes(s) ||
        (t.name||"").toLowerCase().includes(s) ||
        (t.en||"").toLowerCase().includes(s) ||
        (t.id||"").toLowerCase().includes(s));
      if(!hits.length){ hint.textContent = "Tidak ada yang cocok."; return; }

      const byLang = new Map();
      hits.forEach(t => {
        const L = t.lang || "—";
        if(!byLang.has(L)) byLang.set(L,[]);
        byLang.get(L).push(t);
      });
      hint.textContent = `${hits.length} versi dalam ${byLang.size} bahasa.`;

      [...byLang.entries()].sort((a,b) => b[1].length - a[1].length).forEach(([L,arr]) => {
        listed.appendChild(el("div","sechead", `${L} — ${arr.length} versi`));
        arr.sort((a,b) => b.books - a.books).slice(0,40).forEach(t => {
          const b = el("button","res" + (S.cols.includes(t.id) ? " on" : ""));
          const d = el("div","t");
          d.appendChild(el("b", null, t.name));
          d.appendChild(el("i", null, `${t.en || t.lang} · ${t.id}`));
          b.appendChild(d);
          b.appendChild(el("span","tag" + (t.books === 66 ? " full" : ""), t.books + " kitab"));
          b.onclick = () => pick(t.id, {
            id:t.id, name:t.name, abbr:t.abbr, lang:t.lang,
            books:t.books, cjk:t.cjk, rtl:t.rtl
          });
          listed.appendChild(b);
        });
      });
    }

    q.oninput = drawSearch;
    drawInstalled();
    loadCatalog().then(drawInstalled);
    setTimeout(() => q.focus(), 120);
  });
}

async function loadCatalog(){
  if(S.catState === "ok" || S.catState === "loading") return;
  S.catState = "loading";
  try{
    const r = await fetch(`${AO}/available_translations.json`);
    if(!r.ok) throw new Error("HTTP " + r.status);
    const j = await r.json();
    S.catalog = (j.translations || []).map(t => ({
      id:t.id, name:t.name, abbr:t.shortName || t.id,
      lang:t.languageEnglishName || t.language, native:t.languageName,
      en:t.englishName, books:t.numberOfBooks,
      rtl:t.textDirection === "rtl",
      cjk:/chinese|japanese|korean/i.test(t.languageEnglishName || "")
    }));
    S.catState = "ok";
  }catch(e){ S.catState = "err"; console.error("katalog:", e.message); }
}

/* =========================================================
   RENUNGAN HARIAN
   Tiap hari: 1 pasal PL (urut), 1 pasal PB (urut), 1 pasal Amsal.
   Amsal mengikuti tanggal (1–31) — kebiasaan baca Amsal yang umum.
   PL & PB berjalan urut dari Kejadian / Matius dan berulang setelah
   selesai. Titik awal siklus = 1 Januari 2026.
   ========================================================= */
const PLAN_EPOCH = Date.UTC(2026,0,1);
function flatten(list){
  const o = [];
  for(const b of list) for(let c=1;c<=b.ch;c++) o.push([b.id,c]);
  return o;
}
let OTF=null, NTF=null;
function planLists(){
  if(!OTF){
    OTF = flatten(BOOKS.filter(b => b.t === "PL" && b.id !== "ams"));
    NTF = flatten(BOOKS.filter(b => b.t === "PB"));
  }
  return [OTF,NTF];
}
function dayIndex(d){
  return Math.floor((Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()) - PLAN_EPOCH) / 86400000);
}
function planFor(d){
  const [ot,nt] = planLists();
  const i = dayIndex(d);
  const wrap = (arr,n) => arr[((n % arr.length) + arr.length) % arr.length];
  return {
    ot: wrap(ot,i),
    nt: wrap(nt,i),
    am: ["ams", Math.min(d.getDate(), 31)],
    idx: i
  };
}
function planKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function planPicker(){
  const today = new Date();
  let view = new Date(today);
  ov("Renungan harian", box => {
    const draw = () => {
      box.querySelectorAll(".pbody").forEach(n => n.remove());
      const body = el("div","pbody");
      const p = planFor(view);
      const key = planKey(view);
      const done = S.plan[key] || {};

      const nav = el("div","trow");
      const back = el("button","btn ghost","‹ Kemarin");
      back.onclick = () => { view.setDate(view.getDate()-1); draw(); };
      const now = el("button","btn ghost","Hari ini");
      now.onclick = () => { view = new Date(today); draw(); };
      const fwd = el("button","btn ghost","Besok ›");
      fwd.onclick = () => { view.setDate(view.getDate()+1); draw(); };
      nav.appendChild(back); nav.appendChild(now); nav.appendChild(fwd);
      body.appendChild(nav);

      const dd = view.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      body.appendChild(el("p","hint", dd));

      const items = [
        ["Perjanjian Lama", p.ot, "ot"],
        ["Perjanjian Baru", p.nt, "nt"],
        ["Amsal", p.am, "am"],
      ];
      let allDone = true;
      items.forEach(([label,[bid,ch],slot]) => {
        const b = bk(bid);
        const r = el("button","res" + (done[slot] ? " on" : ""));
        const chk = el("span","chk" + (done[slot] ? " on" : ""), done[slot] ? "✓" : "");
        chk.onclick = ev => {
          ev.stopPropagation();
          const cur = S.plan[key] || {};
          if(cur[slot]) delete cur[slot]; else cur[slot] = true;
          if(Object.keys(cur).length) S.plan[key] = cur; else delete S.plan[key];
          persist(); draw();
        };
        r.appendChild(chk);
        const t = el("div","t");
        t.appendChild(el("b", null, `${b.name} ${ch}`));
        t.appendChild(el("i", null, `${label} · ${b.en} ${ch}`));
        r.appendChild(t);
        r.onclick = () => {
          S.book = bid; S.ch = ch; S.sel = null;
          persist(); closeOv(); render(); scrollTo(0,0);
        };
        body.appendChild(r);
        if(!done[slot]) allDone = false;
      });

      const streak = countStreak(today);
      body.appendChild(el("p","hint",
        (allDone ? "Selesai untuk hari ini. " : "") +
        (streak > 0 ? `Rentetan hari selesai: ${streak}.` : "Tandai bacaan yang sudah selesai dengan kotak centang.")));
      box.appendChild(body);
    };
    draw();
  });
}
function countStreak(from){
  let n = 0;
  const d = new Date(from);
  for(let i=0;i<400;i++){
    const k = planKey(d);
    const v = S.plan[k];
    if(v && v.ot && v.nt && v.am) n++;
    else if(i > 0) break;
    else if(!v) break;
    d.setDate(d.getDate()-1);
  }
  return n;
}

/* =========================================================
   CARI AYAT — pencarian teks
   Mencari di versi kolom pertama. Sumber pencarian:
   - bila versi sudah diunduh: seluruh Alkitab, langsung dari perangkat
   - bila belum: hanya pasal/kitab yang dipilih, diambil lewat jaringan
   Ini dibuat jujur di UI supaya tidak terkesan mencari seluruh Alkitab
   padahal cuma satu pasal.
   ========================================================= */
function norm(s){
  return s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^\p{L}\p{N}\s]/gu," ")
    .replace(/\s+/g," ").trim();
}
/* Semua kata pencarian harus cocok (AND), bukan salah satu saja.
   Tanpa ini, kueri seperti "xyz tidak ada" akan mengembalikan tiap ayat
   yang memuat kata umum "ada" — hasil yang menyesatkan. */
function scoreLine(hay, terms){
  let sc = 0;
  for(const t of terms){
    if(!t) continue;
    if(hay.includes(t)){
      sc += t.length * 3;
      if(new RegExp("\\b" + t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + "\\b").test(hay)) sc += 6;
    }else if(t.length >= 5){
      // kata panjang boleh cocok sebagian (imbuhan), kata pendek tidak
      const stem = t.slice(0, t.length - 2).replace(/[.*+?^${}()|[\]\\]/g,"\\$&");
      if(new RegExp("\\b" + stem).test(hay)) sc += t.length;
      else return 0;
    }else return 0;
  }
  return sc;
}

function searchPicker(){
  const scope = {ot:true, nt:true, book:false, chapter:false};
  ov("Cari ayat", box => {
    const vid = S.cols[0];
    const v = VER[vid] || {};

    const q = el("input","srch");
    q.type = "search";
    q.placeholder = "Ketik kata atau potongan ayat…";
    box.appendChild(q);

    const scopeBox = el("div");
    scopeBox.style.cssText = "display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px";
    box.appendChild(scopeBox);

    const status = el("p","hint","");
    box.appendChild(status);
    const out = el("div");
    box.appendChild(out);

    let downloaded = false;
    offlineLoad(vid).then(m => { downloaded = !!m; drawScope(); });

    function drawScope(){
      scopeBox.innerHTML = "";
      const opts = [
        ["ot","Perjanjian Lama"],
        ["nt","Perjanjian Baru"],
        ["book","Kitab ini (" + cur().name + ")"],
        ["chapter","Pasal ini"],
      ];
      opts.forEach(([k,label]) => {
        const b = el("button","pill" + (scope[k] ? " on" : ""));
        b.appendChild(el("span", null, (scope[k] ? "✓ " : "") + label));
        b.onclick = () => {
          scope[k] = !scope[k];
          // "pasal ini" dan "kitab ini" mempersempit; PL/PB jadi tak relevan
          if(k === "chapter" && scope.chapter){ scope.book = false; }
          if(k === "book" && scope.book){ scope.chapter = false; }
          drawScope(); run();
        };
        scopeBox.appendChild(b);
      });
      status.textContent = downloaded
        ? `Mencari di ${v.abbr || vid} — sudah diunduh, seluruh Alkitab bisa dicari.`
        : `Mencari di ${v.abbr || vid} — belum diunduh, jadi hanya cakupan sempit (pasal/kitab ini) yang dicari lewat jaringan. Unduh versi ini lewat ⬇ untuk mencari seluruh Alkitab.`;
    }

    let timer = null;
    q.oninput = () => { clearTimeout(timer); timer = setTimeout(run, 260); };

    async function run(){
      const raw = q.value.trim();
      out.innerHTML = "";
      if(raw.length < 2) return;
      const terms = norm(raw).split(" ").filter(t => t.length > 1);
      if(!terms.length) return;

      out.appendChild(el("p","hint","Mencari…"));
      const hits = [];

      const off = await offlineLoad(vid);
      if(off){
        for(const [key,text] of off){
          const [bid,ch,vn] = key.split(".");
          const b = bk(bid); if(!b) continue;
          if(scope.chapter && !(bid === S.book && +ch === S.ch)) continue;
          if(!scope.chapter && scope.book && bid !== S.book) continue;
          if(!scope.chapter && !scope.book){
            if(b.t === "PL" && !scope.ot) continue;
            if(b.t === "PB" && !scope.nt) continue;
          }
          const sc = scoreLine(norm(text), terms);
          if(sc > 0) hits.push({b, ch:+ch, v:+vn, text, sc});
        }
      }else{
        // tanpa unduhan: batasi ke pasal ini atau kitab ini saja
        const targets = [];
        if(scope.chapter || (!scope.book)) targets.push([S.book, S.ch]);
        if(scope.book && !scope.chapter){
          const b = cur();
          for(let c=1;c<=b.ch;c++) targets.push([b.id,c]);
        }
        const capped = targets.slice(0,60);
        for(const [bid,ch] of capped){
          const d = await getCh(vid, bid, ch);
          if(!d.ok) continue;
          for(const [n,text] of d.m){
            const sc = scoreLine(norm(text), terms);
            if(sc > 0) hits.push({b:bk(bid), ch, v:n, text, sc});
          }
        }
      }

      out.innerHTML = "";
      if(!hits.length){
        out.appendChild(el("p","hint","Tidak ditemukan. Coba kata lain, atau perluas cakupan."));
        return;
      }
      hits.sort((a,b) => b.sc - a.sc);
      out.appendChild(el("div","sechead", `${hits.length} hasil — 40 teratas`));
      hits.slice(0,40).forEach(h => {
        const r = el("button","res");
        const t = el("div","t");
        t.appendChild(el("b", null, `${h.b.name} ${h.ch}:${h.v}`));
        const snippet = h.text.length > 120 ? h.text.slice(0,118) + "…" : h.text;
        t.appendChild(el("i", null, snippet));
        r.appendChild(t);
        r.onclick = () => {
          S.book = h.b.id; S.ch = h.ch; S.sel = h.v;
          persist(); closeOv(); render(); scrollTo(0,0);
        };
        out.appendChild(r);
      });
    }

    drawScope();
    setTimeout(() => q.focus(), 120);
  });
}

function sylPicker(){
  let tab = cur().t;
  ov("Silabus Alkitab", box => {
    const wrapEl = el("div");
    box.appendChild(wrapEl);
    const draw = () => {
      wrapEl.innerHTML = "";
      const tabs = el("div","tabs");
      [["PL","Perjanjian Lama"],["PB","Perjanjian Baru"]].forEach(([t,l]) => {
        const b = el("button","pill" + (tab === t ? " on" : ""), l);
        b.onclick = () => { tab = t; draw(); };
        tabs.appendChild(b);
      });
      wrapEl.appendChild(tabs);
      wrapEl.appendChild(el("p","hint","Ringkasan singkat tiap kitab: penulis menurut pandangan umum, tema utama, dan pasal kunci untuk memulai. Ketuk untuk membuka."));

      BOOKS.filter(b => b.t === tab).forEach(b => {
        const s = SYL[b.id];
        if(!s) return;
        const r = el("button","res" + (b.id === S.book ? " on" : ""));
        const t = el("div","t");
        t.appendChild(el("b", null, `${b.name} — ${s[1]}`));
        t.appendChild(el("i", null, `${s[2]}`));
        const meta = el("i");
        meta.style.marginTop = "3px";
        meta.textContent = `Penulis: ${s[0]} · Pasal kunci: ${s[3]} · ${b.ch} pasal`;
        t.appendChild(meta);
        r.appendChild(t);
        r.onclick = () => {
          const first = parseInt(String(s[3]).match(/\d+/)?.[0] || "1", 10);
          S.book = b.id; S.ch = Math.min(Math.max(first,1), b.ch); S.sel = null;
          persist(); closeOv(); render(); scrollTo(0,0);
        };
        wrapEl.appendChild(r);
      });
    };
    draw();
  });
}
</script>
